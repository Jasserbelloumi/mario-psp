name: Mario-Build-Action
on: [push]
jobs:
  build_game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          docker run --rm -v $(pwd):/src -w /src pspdev/pspdev:latest sh -c "make"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Mario-Game-EBOOT
          path: EBOOT.PBP
